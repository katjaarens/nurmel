<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <title>Profil von Nuts</title>
    <style>
        script[type="py"] { display: none; }
        /* Überschreibt das Hintergrundbild nur für diese Seite, falls gewünscht */
        body { background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e0 100%); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="nuts.html" style="background: rgba(99, 179, 237, 0.2);">Nuts</a>
        <a href="urmel.html">Urmel</a>
        <a href="abenteuer.html">Abenteuer</a>
        <a href="Wuff-O-Meter.html">Dolmetscher 🎙️</a>
    </nav>

    <audio id="nuts-sound" src="nuts_audio.mp3" preload="auto"></audio>

    <div class="container">
        
        <div class="card" style="text-align: center; margin-top: 20px;">
            
            <div style="position: relative; display: inline-block;">
                <img src="nuts_profil.jpg" 
                     onclick="document.getElementById('nuts-sound').play()" 
                     style="width: 250px; height: 250px; border-radius: 50%; border: 10px solid white; object-fit: cover; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 8px 20px rgba(0,0,0,0.1);"
                     onmouseover="this.style.transform='scale(1.05)';" 
                     onmouseout="this.style.transform='scale(1)';"
                     alt="Nuts Profilbild">
                
                <div style="position: absolute; bottom: 10px; right: 10px; background: #2c5282; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5em; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
                    🔊
                </div>
            </div>

            <h1 style="color: #2c5282; font-size: 3em; margin: 20px 0 10px 0; font-weight: 700;">Nuts</h1>
            <p style="font-size: 1.2em; color: #4a5568; font-style: italic; margin-bottom: 20px;">
                "Warum rennen, wenn man auch liegen kann?" 🧘‍♂️
            </p>

            <div style="background: rgba(255, 255, 255, 0.5); border-radius: 20px; padding: 25px; margin: 20px auto; max-width: 550px; border-left: 5px solid #2c5282; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <p id="quote-display" style="font-style: italic; font-size: 1.1em; color: #2d3748; margin-bottom: 15px; min-height: 1.5em;">
                    Nuts überlegt sich eine Weisheit...
                </p>
                <button py-click="new_quote">
                    Nuts’ Weisheit abrufen 🍖
                </button>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; text-align: left; margin-top: 30px;">
                <div style="background: rgba(255,255,255,0.4); padding: 20px; border-radius: 20px;">
                    <div style="font-weight: 700; color: #2c5282; font-size: 0.9em; text-transform: uppercase; margin-bottom: 5px;">Rasse</div>
                    <div style="font-size: 1.1em;">Aussiedor (Aussie & Labbi)</div>
                </div>
                <div style="background: rgba(255,255,255,0.4); padding: 20px; border-radius: 20px;">
                    <div style="font-weight: 700; color: #2c5282; font-size: 0.9em; text-transform: uppercase; margin-bottom: 5px;">Lieblings-Snack</div>
                    <div style="font-size: 1.1em;">Alles, was essbar ist</div>
                </div>
                <div style="background: rgba(255,255,255,0.4); padding: 20px; border-radius: 20px;">
                    <div style="font-weight: 700; color: #2c5282; font-size: 0.9em; text-transform: uppercase; margin-bottom: 5px;">Hobby</div>
                    <div style="font-size: 1.1em;">Profi-Schnarchen & Kuscheln</div>
                </div>
                <div style="background: rgba(255,255,255,0.4); padding: 20px; border-radius: 20px;">
                    <div style="font-weight: 700; color: #2c5282; font-size: 0.9em; text-transform: uppercase; margin-bottom: 5px;">Superkraft</div>
                    <div style="font-size: 1.1em;">Bettelblick Stufe 10 🥺</div>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <a href="index.html" class="button" style="text-decoration: none; display: inline-block; background: #1c1e21;">
                ← Zurück zum Dashboard
            </a>
        </div>
    </div>

    <script type="py">
import random
from pyscript import document

def new_quote(event):
    quotes = [
        "„Ich starre nicht. Ich warte nur darauf, dass die Schwerkraft dein Schnitzel zu mir bringt.“ 🥩",
        "„Ein Tag ohne Nickerchen ist ein verlorener Tag.“ 😴",
        "„Wurst ist die Antwort. Die Frage ist eigentlich egal.“ 🌭",
        "„Ich höre dir genau zu. Solange deine Hand in der Leckerli-Tüte raschelt.“ 👂",
        "„Der klügere Hund gibt nach – und zwar direkt vor dem Kühlschrank.“ 🧀"
    ]
    document.getElementById("quote-display").innerHTML = random.choice(quotes)
</script>

</body>
</html>
