<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <py-config>
        packages = ["pyodide-http", "requests"]
    </py-config>

    <style>
        py-config { display: none; }
        /* Kleiner Fix für das Laden von PyScript */
        #weather-display:empty::before { content: "Wetter-Check läuft..."; }
    </style>
    <title>Abenteuer - Urmel & Nuts</title>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="nuts.html">Nuts</a>
        <a href="urmel.html">Urmel</a>
        <a href="abenteuer.html" style="background: rgba(99, 179, 237, 0.2);">Abenteuer</a>
        <a href="Wuff-O-Meter.html">Dolmetscher 🎙️</a>
    </nav>

    <div class="container">
        
        <div class="card" style="background: linear-gradient(135deg, #2c5282, #63b3ed) !important; color: white; text-align: center; margin-bottom: 30px;">
            <h1 style="margin: 0; font-size: 2.5em; font-weight: 700;">Unsere Abenteuer 🐾🐾</h1>
            <p style="font-size: 1.2em; opacity: 0.9; margin: 15px 0 25px 0;">Was wir heute wohl erleben?</p>
            
            <button py-click="get_adventure" id="dice-button">
                🎲 Vorschlag würfeln
            </button>
        </div>

        <div class="card" style="text-align: center; margin-bottom: 20px; padding: 20px !important;">
            <div id="weather-display" style="font-size: 1.2em; color: #1c1e21; font-weight: 600;">
                Prüfe Wetterbedingungen...
            </div>
        </div>

        <div id="adventure-result-card" class="card" style="display: none; text-align: center; animation: fadeIn 0.5s;">
            <div style="font-size: 0.8em; color: #2c5282; font-weight: 700; text-transform: uppercase; margin-bottom: 10px;">Heutiges Ziel:</div>
            <div id="adventure-display" style="font-size: 1.8em; font-weight: 700; color: #2c5282;"></div>
        </div>

    </div>

    <script type="py">
import random
import requests
import pyodide_http
from pyscript import document

# Ermöglicht HTTP-Requests in PyScript
pyodide_http.patch_all()

def get_weather():
    try:
        # Wetter für Erwitte (51.61, 8.34)
        response = requests.get("https://api.open-meteo.com/v1/forecast?latitude=51.61&longitude=8.34&current_weather=true")
        if response.status_code == 200:
            data = response.json()
            temp = data['current_weather']['temperature']
            document.getElementById("weather-display").innerHTML = f"Aktuell in Erwitte: {temp}°C 🐾"
        else:
            document.getElementById("weather-display").innerHTML = "Wetter-Server schläft gerade... 💤"
    except Exception as e:
        document.getElementById("weather-display").innerHTML = "Schau aus dem Fenster! 🪟"

def get_adventure(event):
    abenteuer = [
        "Die Boden-ist-Lava-Challenge: Nur über Teppiche laufen! 🔥",
        "Nuts' Traum: Ein kontrolliertes 30-Minuten-Nickerchen im Sonnenstrahl ☀️",
        "Urmels Speed-Training: 10 Runden um den Esstisch (Drift inklusive) 🏎️",
        "Das große Schnüffel-Lotto: Wer findet das versteckte Stück Käse zuerst? 🧀",
        "Eichhörnchen-TV: 10 Minuten intensives Beobachten am Fenster 🐿️",
        "Pfoten-Wellness: Eine Massage für müde Gassi-Muskeln 🐾",
        "Der 'Unsichtbare' Keks: Tu so, als würdest du ein Leckerli werfen! 🎭",
        "Nuts entscheidet die Richtung: Wir folgen der Nase, egal wohin! 👃",
        "Urmel-Special: Socken-Sortieren (Wir klauen sie, du suchst sie) 🧦",
        "Das 'Komm-her-aber-bleib-da'-Spiel: Verwirrung pur! 😵‍💫",
        "Unterwasser-Expedition: Wir werfen Steinchen in den Bach 🌊",
        "Die Leckerli-Pipeline: Rollende Leckerlis über den Parkettboden jagen 💨",
        "Show-Laufen: Wer kann am schönsten 'Sitz' machen? 🎩",
        "Der 'Stille' Beobachter: Wer kann länger ununterbrochen starren? 👀",
        "Das Schnitzelsuchgerät: Wir trainieren für den Biergarten 🥩"
    ]
    # Zeige die Karte und wähle zufällig
    document.getElementById("adventure-result-card").style.display = "block"
    document.getElementById("adventure-display").innerHTML = random.choice(abenteuer)

# Direkt beim Laden ausführen
get_weather()
    </script>

</body>
</html>
